server:
  http_listen_address: 0.0.0.0
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["opsdesk-api", "opsdesk-worker", "opsdesk-realtime"]
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        replacement: '$1'
        target_label: container
      - source_labels: ['__meta_docker_container_name']
        regex: '/?opsdesk-(api|worker|realtime)'
        replacement: '$1'
        target_label: service
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
