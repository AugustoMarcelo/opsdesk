global:
  scrape_interval: 5s
  scrape_timeout: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'api'
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['api:3000']
  - job_name: 'worker'
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['worker:3003']
  - job_name: 'realtime'
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['realtime:3002']