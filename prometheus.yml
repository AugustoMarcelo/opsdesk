global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:3000']
  - job_name: 'worker'
    static_configs:
      - targets: ['worker:3003']
  - job_name: 'realtime'
    static_configs:
      - targets: ['realtime:3002']